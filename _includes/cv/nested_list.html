<ul class="cv-nested-list">
  {% for content in entry.contents %}
    <li class="cv-nested-list__item">
      <h3 class="cv-nested-list__title">{{ content.title }}</h3>
      {% if content.items %}
        <ul class="cv-subitems">
          {% for subitem in content.items %}
            <li><span class="subitem">{{ subitem }}</span></li>
          {% endfor %}
        </ul>
      {% endif %}
    </li>
  {% endfor %}
</ul>
