---
layout: default
---
<!-- page.html -->
        <div class="post museum-page museum-content-page">

          <header class="post-header">
            {% if page.kicker %}
            <p class="page-kicker">{{ page.kicker }}</p>
            {% endif %}
            <h1 class="post-title">{{ page.title }}</h1>
            {% if page.description %}
            <p class="post-description">{{ page.description }}</p>
            {% endif %}
          </header>

          <article class="page-article museum-panel">
            {{ content }}
          </article>

        </div>
